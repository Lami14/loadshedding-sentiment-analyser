version: "3.8"

services:

  # ─── Flask Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
    volumes:
      - ./backend:/app
    restart: unless-stopped

  # ─── React Frontend ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
